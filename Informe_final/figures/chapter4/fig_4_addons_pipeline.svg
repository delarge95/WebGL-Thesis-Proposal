<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#222"/>
    </marker>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M 18 0 L 0 0 0 18" fill="none" stroke="#dddddd" stroke-width="0.7"/>
    </pattern>
  </defs>
  <style>
    text { font-family: Roboto, Arial, Helvetica, sans-serif; fill: #111; }
    .title { font-size: 25px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #444; }
    .boxTitle { font-size: 17px; font-weight: 700; }
    .body { font-size: 14.5px; fill: #222; }
    .small { font-size: 13px; fill: #333; }
    .smallBold { font-size: 13px; font-weight: 700; fill: #111; }
    .note { font-size: 13px; fill: #555; font-style: italic; }
    .arrow { fill: none; stroke: #222; stroke-width: 1.5; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 5 5; }
    .thin { fill: none; stroke: #222; stroke-width: 1.2; }
    .muted { fill: #eeeeee; stroke: #222; stroke-width: 1.2; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <text x="500" y="42" class="title" text-anchor="middle">Tooling propio para automatizar el pipeline CAD</text>
  <text x="500" y="68" class="subtitle" text-anchor="middle">Herramientas de soporte: no son funciones visibles para el usuario final</text>
  
  <rect x="370" y="100" width="260" height="96" rx="6" fill="#eeeeee" stroke="#222" stroke-width="1.4"/>
  <text x="500" y="128" class="boxTitle" text-anchor="middle">Nucleo Blender</text>
  <text x="500" y="156" class="body" text-anchor="middle">escena y colecciones</text>
<text x="500" y="174" class="body" text-anchor="middle">objetos</text>
<text x="500" y="192" class="body" text-anchor="middle">datos de malla</text>
  
  
  <rect x="60" y="230" width="210" height="96" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="165" y="258" class="boxTitle" text-anchor="middle">Symmetry Instancer</text>
  <text x="165" y="286" class="body" text-anchor="middle">detecta repetidos</text>
<text x="165" y="304" class="body" text-anchor="middle">masters e instancias</text>
<text x="165" y="322" class="body" text-anchor="middle">matrices de transform</text>
  
  
  <rect x="295" y="230" width="190" height="96" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="390" y="258" class="boxTitle" text-anchor="middle">Mesh Swapper</text>
  <text x="390" y="286" class="body" text-anchor="middle">reemplaza malla</text>
<text x="390" y="304" class="body" text-anchor="middle">sin mover pieza</text>
<text x="390" y="322" class="body" text-anchor="middle">preserva material</text>
  
  
  <rect x="510" y="230" width="210" height="96" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="615" y="258" class="boxTitle" text-anchor="middle">Fastener Proxy</text>
  <text x="615" y="286" class="body" text-anchor="middle">detecta tornillos</text>
<text x="615" y="304" class="body" text-anchor="middle">proxy ligero</text>
<text x="615" y="322" class="body" text-anchor="middle">metadatos familia</text>
  
  
  <rect x="745" y="230" width="190" height="96" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="840" y="258" class="boxTitle" text-anchor="middle">Bake / Manifest</text>
  <text x="840" y="286" class="body" text-anchor="middle">targets PBR</text>
<text x="840" y="304" class="body" text-anchor="middle">mask packing</text>
<text x="840" y="322" class="body" text-anchor="middle">reporte runtime</text>
  
  <path d="M 430 196 L 165 230" class="arrow"/>
  <path d="M 460 196 L 390 230" class="arrow"/>
  <path d="M 540 196 L 615 230" class="arrow"/>
  <path d="M 570 196 L 840 230" class="arrow"/>
  <rect x="108" y="405" width="784" height="70" rx="6" fill="#fff" stroke="#222" stroke-width="1.2"/>
  <text x="500" y="433" class="smallBold" text-anchor="middle">Salida auditable</text>
  <text x="500" y="456" class="small" text-anchor="middle">Manifest, familias, instancias, proxies y targets de textura listos para importacion y verificacion en Unity.</text>
  
</svg>
