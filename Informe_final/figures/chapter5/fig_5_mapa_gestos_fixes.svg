<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <style>
        .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #1a1a1a; }
        .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; fill: #4a4a4a; }
        .box-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; fill: #1a1a1a; }
        .box-text-bold { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1a1a1a; }
        .note { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-style: italic; fill: #666666; }
        .box { fill: #f9f9f9; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .box-dark { fill: #e0e0e0; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .box-header { fill: #cccccc; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .arrow { fill: none; stroke: #333333; stroke-width: 1.5; marker-end: url(#arrowhead); }
        .line { fill: none; stroke: #333333; stroke-width: 1.5; stroke-dasharray: 4,4; }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="white"/>
    <text x="400" y="30" text-anchor="middle" class="title">Mapa de Gestos y Correcciones (QA Formativa)</text><text x="400" y="50" text-anchor="middle" class="subtitle">Evolución de interacciones hacia gestos naturales (Visual Product Twin)</text><rect x="50" y="80" width="200" height="40" class="box-header"/>
<text x="150.0" y="105.0" text-anchor="middle" class="box-text">Gesto Espontáneo Observado</text><rect x="300" y="80" width="200" height="40" class="box-header"/>
<text x="400.0" y="105.0" text-anchor="middle" class="box-text">Fricción Detectada</text><rect x="550" y="80" width="200" height="40" class="box-header"/>
<text x="650.0" y="105.0" text-anchor="middle" class="box-text">Solución en UI (P1/P2)</text><rect x="30" y="140" width="220" height="60" class="box"/>
<text x="140.0" y="165.0" text-anchor="middle" class="box-text">Deslizar tarjetas del</text>
<text x="140.0" y="185.0" text-anchor="middle" class="box-text">tutorial (Swipe)</text><path d="M 250 170 L 290 170" class="arrow"/><rect x="290" y="140" width="220" height="60" class="box"/>
<text x="400.0" y="165.0" text-anchor="middle" class="box-text">Tutorial requería clics</text>
<text x="400.0" y="185.0" text-anchor="middle" class="box-text">explícitos en flechas</text><path d="M 510 170 L 550 170" class="arrow"/><rect x="550" y="140" width="220" height="60" class="box"/>
<text x="660.0" y="165.0" text-anchor="middle" class="box-text">Soporte de swipe y</text>
<text x="660.0" y="185.0" text-anchor="middle" class="box-text">cierre vertical añadido</text><rect x="30" y="220" width="220" height="60" class="box"/>
<text x="140.0" y="245.0" text-anchor="middle" class="box-text">Arrastrar verticalmente</text>
<text x="140.0" y="265.0" text-anchor="middle" class="box-text">el panel (Drag)</text><path d="M 250 250 L 290 250" class="arrow"/><rect x="290" y="220" width="220" height="60" class="box"/>
<text x="400.0" y="245.0" text-anchor="middle" class="box-text">Panel se abría al hacer</text>
<text x="400.0" y="265.0" text-anchor="middle" class="box-text">órbita sobre la pieza</text><path d="M 510 250 L 550 250" class="arrow"/><rect x="550" y="220" width="220" height="60" class="box"/>
<text x="660.0" y="245.0" text-anchor="middle" class="box-text">Panel bloquea área táctil</text>
<text x="660.0" y="265.0" text-anchor="middle" class="box-text">para arrastre exclusivo</text><rect x="30" y="300" width="220" height="60" class="box"/>
<text x="140.0" y="325.0" text-anchor="middle" class="box-text">Doble toque para</text>
<text x="140.0" y="345.0" text-anchor="middle" class="box-text">aislar componente</text><path d="M 250 330 L 290 330" class="arrow"/><rect x="290" y="300" width="220" height="60" class="box"/>
<text x="400.0" y="325.0" text-anchor="middle" class="box-text">Un solo toque era</text>
<text x="400.0" y="345.0" text-anchor="middle" class="box-text">demasiado agresivo</text><path d="M 510 330 L 550 330" class="arrow"/><rect x="550" y="300" width="220" height="60" class="box"/>
<text x="660.0" y="325.0" text-anchor="middle" class="box-text">Aislamiento/Retorno</text>
<text x="660.0" y="345.0" text-anchor="middle" class="box-text">establecido al doble tap</text><rect x="30" y="380" width="220" height="60" class="box"/>
<text x="140.0" y="405.0" text-anchor="middle" class="box-text">Volver atrás con</text>
<text x="140.0" y="425.0" text-anchor="middle" class="box-text">botón del móvil</text><path d="M 250 410 L 290 410" class="arrow"/><rect x="290" y="380" width="220" height="60" class="box"/>
<text x="400.0" y="405.0" text-anchor="middle" class="box-text">El navegador cerraba</text>
<text x="400.0" y="425.0" text-anchor="middle" class="box-text">la aplicación WebGL</text><path d="M 510 410 L 550 410" class="arrow"/><rect x="550" y="380" width="220" height="60" class="box"/>
<text x="660.0" y="405.0" text-anchor="middle" class="box-text">Pila de estados y</text>
<text x="660.0" y="425.0" text-anchor="middle" class="box-text">confirmación de salida</text>
</svg>
