    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityInstanceRef = null;

      function resizeCanvasToViewport() {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.width = Math.max(window.innerWidth || document.documentElement.clientWidth || 1080, 1);
        canvas.height = Math.max(window.innerHeight || document.documentElement.clientHeight || 720, 1);
      }

      resizeCanvasToViewport();
      window.addEventListener("resize", resizeCanvasToViewport);

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
      }

      window.addEventListener("message", function (event) {
        var sameOrigin = window.location.protocol === "file:" || event.origin === window.location.origin;
        if (!sameOrigin || !event.data || event.data.type !== "x500v2:browser-back") return;
        if (unityInstanceRef && unityInstanceRef.SendMessage) {
          unityInstanceRef.SendMessage("X500V2BrowserBackBridge", "HandleBrowserBackFromPage");
        }
      });

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/dd2d9347c6ae4168505a2ac8523e8298.data.unityweb",
        frameworkUrl: "Build/4b9ddf45516b667813ffa051bc7837ae.framework.js.unityweb",
        codeUrl: "Build/85d8b0fe4da8ed7dbf74dc7e989dee4c.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "UNAD",
        productName: "WebGL Drone Viewer",
        productVersion: "1.0",
        devicePixelRatio: 1,
      }).then((unityInstance) => {
        unityInstanceRef = unityInstance;
        window.x500v2UnityInstance = unityInstance;
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
