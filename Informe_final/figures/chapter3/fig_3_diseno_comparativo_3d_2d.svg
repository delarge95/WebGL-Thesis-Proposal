<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <style>
      text { font-family: Roboto, Arial, Helvetica, sans-serif; fill: #000; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #333; }
      .head { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; }
      .small { font-size: 13px; fill: #333; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.4; rx: 10; }
      .soft { fill: #f7f7f7; stroke: #000; stroke-width: 1.2; rx: 8; }
      .arrow { fill: none; stroke: #000; stroke-width: 1.4; marker-end: url(#arrowhead); }
      .dash { fill: none; stroke: #555; stroke-width: 1.2; stroke-dasharray: 7 6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <text class="title" x="590" y="44" text-anchor="middle">Diseño comparativo 3D vs. soporte 2D</text>
  <text class="subtitle" x="590" y="72" text-anchor="middle">Diseño intra-sujeto formativo: mismas tareas funcionales, distinto medio de representación y orden contrabalanceado.</text>

  <rect class="box" x="44" y="140" width="190" height="120"/>
  <text class="head" x="139" y="170" text-anchor="middle">Participante</text>
  <text class="body" x="139" y="200" text-anchor="middle">
    <tspan x="139" dy="0">Perfil afín a</tspan>
    <tspan x="139" dy="18">ingeniería, diseño,</tspan>
    <tspan x="139" dy="18">mantenimiento o 3D.</tspan>
  </text>

  <rect class="box" x="286" y="128" width="230" height="144"/>
  <text class="head" x="401" y="158" text-anchor="middle">Contrabalanceo</text>
  <text class="body" x="401" y="190" text-anchor="middle">
    <tspan x="401" dy="0">Secuencia AB</tspan>
    <tspan x="401" dy="18">3D → 2D</tspan>
    <tspan x="401" dy="26">Secuencia BA</tspan>
    <tspan x="401" dy="18">2D → 3D</tspan>
  </text>

  <rect class="soft" x="576" y="106" width="250" height="120"/>
  <text class="head" x="701" y="136" text-anchor="middle">Condición A: visor 3D</text>
  <text class="body" x="701" y="166" text-anchor="middle">
    <tspan x="701" dy="0">Navegación orbital, selección,</tspan>
    <tspan x="701" dy="18">bottom sheet, corte, explode,</tspan>
    <tspan x="701" dy="18">hotspots y modos visuales.</tspan>
  </text>

  <rect class="soft" x="576" y="258" width="250" height="120"/>
  <text class="head" x="701" y="288" text-anchor="middle">Condición B: soporte 2D</text>
  <text class="body" x="701" y="318" text-anchor="middle">
    <tspan x="701" dy="0">Paquete documental fijo:</tspan>
    <tspan x="701" dy="18">manuales, láminas, vistas</tspan>
    <tspan x="701" dy="18">y fichas de componentes.</tspan>
  </text>

  <rect class="box" x="890" y="128" width="246" height="144"/>
  <text class="head" x="1013" y="158" text-anchor="middle">Tareas equivalentes</text>
  <text class="body" x="1013" y="190" text-anchor="middle">
    <tspan x="1013" dy="0">Identificar piezas, ubicar</tspan>
    <tspan x="1013" dy="18">relaciones espaciales, consultar</tspan>
    <tspan x="1013" dy="18">información y usar herramientas.</tspan>
  </text>

  <rect class="box" x="286" y="404" width="850" height="96"/>
  <text class="head" x="711" y="434" text-anchor="middle">Instrumentos y registros</text>
  <text class="body" x="711" y="466" text-anchor="middle">
    <tspan x="711" dy="0">Desempeño en tareas: tiempo, éxito, errores y ayudas · NASA-TLX Raw por condición · Think-Aloud y observación estructurada</tspan>
    <tspan x="711" dy="22">SUS se aplica al prototipo 3D como lectura global de usabilidad, no como comparación directa con el paquete 2D.</tspan>
  </text>

  <path class="arrow" d="M234 200 H278"/>
  <path class="arrow" d="M516 200 H568"/>
  <path class="arrow" d="M826 166 H882"/>
  <path class="arrow" d="M826 318 C858 318 858 236 882 236"/>
  <path class="arrow" d="M1013 272 V396"/>
  <path class="dash" d="M576 242 H826"/>
  <text class="small" x="701" y="244" text-anchor="middle">mismo objetivo funcional</text>
</svg>
