<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#222"/>
    </marker>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M 18 0 L 0 0 0 18" fill="none" stroke="#dddddd" stroke-width="0.7"/>
    </pattern>
  </defs>
  <style>
    text { font-family: Roboto, Arial, Helvetica, sans-serif; fill: #111; }
    .title { font-size: 25px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #444; }
    .boxTitle { font-size: 17px; font-weight: 700; }
    .body { font-size: 14.5px; fill: #222; }
    .small { font-size: 13px; fill: #333; }
    .smallBold { font-size: 13px; font-weight: 700; fill: #111; }
    .note { font-size: 13px; fill: #555; font-style: italic; }
    .arrow { fill: none; stroke: #222; stroke-width: 1.5; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 5 5; }
    .thin { fill: none; stroke: #222; stroke-width: 1.2; }
    .muted { fill: #eeeeee; stroke: #222; stroke-width: 1.2; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <rect x="40" y="84" width="190" height="130" rx="6" fill="#f0f0f0" stroke="#222" stroke-width="1.4"/>
  <text x="135" y="112" class="boxTitle" text-anchor="middle">Entrada CAD</text>
  <text x="135" y="140" class="body" text-anchor="middle">STEP / NURBS</text>
<text x="135" y="158" class="body" text-anchor="middle">mallas densas</text>
<text x="135" y="176" class="body" text-anchor="middle">origenes globales</text>
  
  
  <rect x="290" y="84" width="190" height="130" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="385" y="112" class="boxTitle" text-anchor="middle">Diagnostico</text>
  <text x="385" y="140" class="body" text-anchor="middle">legibilidad tecnica</text>
<text x="385" y="158" class="body" text-anchor="middle">costo geometrico</text>
<text x="385" y="176" class="body" text-anchor="middle">relacion por pieza</text>
  
  
  <rect x="540" y="84" width="190" height="130" rx="6" fill="#f7f7f7" stroke="#222" stroke-width="1.4"/>
  <text x="635" y="112" class="boxTitle" text-anchor="middle">Intervencion</text>
  <text x="635" y="140" class="body" text-anchor="middle">retopologia</text>
<text x="635" y="158" class="body" text-anchor="middle">instancias / proxies</text>
<text x="635" y="176" class="body" text-anchor="middle">bake y materiales</text>
  
  
  <rect x="790" y="84" width="170" height="130" rx="6" fill="#f0f0f0" stroke="#222" stroke-width="1.4"/>
  <text x="875" y="112" class="boxTitle" text-anchor="middle">Salida Unity</text>
  <text x="875" y="140" class="body" text-anchor="middle">FBX runtime</text>
<text x="875" y="158" class="body" text-anchor="middle">metadatos</text>
<text x="875" y="176" class="body" text-anchor="middle">seleccion UI</text>
  
  <path d="M 230 149 L 290 149" class="arrow"/>
  <path d="M 480 149 L 540 149" class="arrow"/>
  <path d="M 730 149 L 790 149" class="arrow"/>
  
  <rect x="70" y="280" width="210" height="34" rx="17" fill="#fff" stroke="#222" stroke-width="1.2"/>
  <text x="175" y="302" class="smallBold" text-anchor="middle">Preservar silueta y funcion</text>
  
  <rect x="300" y="280" width="190" height="34" rx="17" fill="#fff" stroke="#222" stroke-width="1.2"/>
  <text x="395" y="302" class="smallBold" text-anchor="middle">Reducir ruido de malla</text>
  
  <rect x="510" y="280" width="210" height="34" rx="17" fill="#fff" stroke="#222" stroke-width="1.2"/>
  <text x="615" y="302" class="smallBold" text-anchor="middle">Conservar trazabilidad</text>
  
  <rect x="740" y="280" width="190" height="34" rx="17" fill="#fff" stroke="#222" stroke-width="1.2"/>
  <text x="835" y="302" class="smallBold" text-anchor="middle">Preparar WebGL</text>
  <path d="M 175 214 L 175 280" class="arrow dashed"/>
  <path d="M 385 214 L 385 280" class="arrow dashed"/>
  <path d="M 640 214 L 640 280" class="arrow dashed"/>
  <path d="M 875 214 L 875 280" class="arrow dashed"/>
  
</svg>
