<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666666"/>
    </marker>
    <style>
      text { font-family: Roboto, Arial, sans-serif; fill: #111111; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #333333; }
      .phase { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; fill: #222222; }
      .small { font-size: 12px; fill: #333333; }
      .metric { font-size: 24px; font-weight: 700; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; rx: 10; ry: 10; }
      .soft { fill: #f5f5f5; stroke: #555555; stroke-width: 1.5; rx: 8; ry: 8; }
      .dashed { fill: #ffffff; stroke: #666666; stroke-width: 2; stroke-dasharray: 8 6; rx: 10; ry: 10; }
      .rail { stroke: #111111; stroke-width: 2; marker-end: url(#arrow); }
      .future { stroke: #666666; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrowGray); }
    </style>
  </defs>

  <text class="title" x="550" y="48" text-anchor="middle">Capas visual-semanticas del prototipo</text>
  <text class="subtitle" x="550" y="78" text-anchor="middle">De CAD optimizado a una lectura tecnica navegable, medible y preparada para interoperabilidad futura</text>

  <rect class="box" x="55" y="125" width="220" height="180"/>
  <text class="phase" x="165" y="158" text-anchor="middle">1. Geometria WebGL</text>
  <text class="body" x="82" y="193">Malla optimizada para</text>
  <text class="body" x="82" y="214">navegador, materiales PBR</text>
  <text class="body" x="82" y="235">y presets visuales.</text>
  <line x1="85" y1="258" x2="245" y2="258" stroke="#999999" stroke-width="1"/>
  <text class="small" x="82" y="281">No se evalua CAD bruto;</text>
  <text class="small" x="82" y="299">se evalua una build interactiva.</text>

  <line class="rail" x1="275" y1="215" x2="330" y2="215"/>

  <rect class="box" x="330" y="125" width="240" height="180"/>
  <text class="phase" x="450" y="158" text-anchor="middle">2. Identidad por pieza</text>
  <g transform="translate(358 186)">
    <rect class="soft" x="0" y="0" width="54" height="50"/>
    <text class="metric" x="27" y="32" text-anchor="middle">28</text>
    <text class="small" x="78" y="19">categorias</text>
    <text class="small" x="78" y="37">canonicas</text>
  </g>
  <g transform="translate(358 245)">
    <rect class="soft" x="0" y="0" width="54" height="50"/>
    <text class="metric" x="27" y="32" text-anchor="middle">30</text>
    <text class="small" x="78" y="19">anchors de</text>
    <text class="small" x="78" y="37">escena</text>
  </g>
  <line class="rail" x1="570" y1="215" x2="625" y2="215"/>

  <rect class="box" x="625" y="125" width="230" height="180"/>
  <text class="phase" x="740" y="158" text-anchor="middle">3. Lectura tecnica</text>
  <g transform="translate(658 188)">
    <circle cx="16" cy="16" r="14" fill="#f5f5f5" stroke="#111111" stroke-width="1.5"/>
    <text class="small" x="42" y="14">seleccion e aislamiento</text>
    <text class="small" x="42" y="34">por componente</text>
  </g>
  <g transform="translate(658 240)">
    <circle cx="16" cy="16" r="14" fill="#f5f5f5" stroke="#111111" stroke-width="1.5"/>
    <text class="small" x="42" y="14">fichas tecnicas, hotspots</text>
    <text class="small" x="42" y="34">y modos de inspeccion</text>
  </g>

  <line class="rail" x1="855" y1="215" x2="910" y2="215"/>

  <rect class="box" x="910" y="125" width="140" height="180"/>
  <text class="phase" x="980" y="158" text-anchor="middle">4. Evidencia</text>
  <text class="body" x="938" y="196">profiler</text>
  <text class="body" x="938" y="219">QA movil</text>
  <text class="body" x="938" y="242">manuales</text>
  <text class="body" x="938" y="265">informe</text>
  <text class="small" x="980" y="297" text-anchor="middle">trazabilidad</text>

  <rect class="soft" x="245" y="365" width="610" height="118"/>
  <text class="phase" x="550" y="398" text-anchor="middle">Renderers concretos en pantalla</text>
  <text class="metric" x="550" y="445" text-anchor="middle">257</text>
  <text class="body" x="550" y="474" text-anchor="middle">fragmentos visuales conectados a jerarquia, seleccion, materiales y estados de la app</text>

  <line class="future" x1="855" y1="424" x2="910" y2="424"/>
  <rect class="dashed" x="910" y="350" width="140" height="148"/>
  <text class="phase" x="980" y="383" text-anchor="middle">Futuro</text>
  <text class="small" x="938" y="414">twin_manifest</text>
  <text class="small" x="938" y="435">partId / material</text>
  <text class="small" x="938" y="456">variables</text>
  <text class="small" x="938" y="477">procedimientos</text>

  <rect class="dashed" x="55" y="525" width="995" height="82"/>
  <text class="phase" x="82" y="557">Limite conceptual de la version evaluada</text>
  <text class="body" x="82" y="581">El prototipo organiza y explica el producto, pero no sincroniza telemetria real, no ejecuta mantenimiento predictivo</text>
  <text class="body" x="82" y="601">y no constituye un gemelo digital operacional.</text>
</svg>
