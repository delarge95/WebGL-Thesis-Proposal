<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
    <style>
        .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #1a1a1a; }
        .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; fill: #4a4a4a; }
        .box-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; fill: #1a1a1a; }
        .box-text-bold { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1a1a1a; }
        .note { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-style: italic; fill: #666666; }
        .box { fill: #f9f9f9; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .box-dark { fill: #e0e0e0; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .box-header { fill: #cccccc; stroke: #333333; stroke-width: 1.5; rx: 4; ry: 4; }
        .arrow { fill: none; stroke: #333333; stroke-width: 1.5; marker-end: url(#arrowhead); }
        .line { fill: none; stroke: #333333; stroke-width: 1.5; stroke-dasharray: 4,4; }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="white"/>
