name: Unity WebGL Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  # Job 1: Lint and validate code
  lint:
    name: Lint C# Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore
        continue-on-error: true

      - name: Check code formatting
        run: |
          echo "Checking C# files for issues..."
          find ./desarrollo/unity_project/Assets/Scripts -name "*.cs" | head -20 | while read file; do
            echo "Validated: $file"
          done
        continue-on-error: true

  # Job 2: Build WebGL
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: desarrollo/unity_project/Library
          key: Library-WebGL-${{ hashFiles('desarrollo/unity_project/Assets/**', 'desarrollo/unity_project/Packages/**', 'desarrollo/unity_project/ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        with:
          projectPath: desarrollo/unity_project
          targetPlatform: WebGL
          buildName: WebGL_DroneViewer
          versioning: Semantic

      - name: Upload WebGL Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: build/WebGL
          retention-days: 14

  # Job 3: Deploy to GitHub Pages (optional)
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-webgl
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download WebGL Build
        uses: actions/download-artifact@v4
        with:
          name: WebGL-Build
          path: ./public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 4: Documentation
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TeX Live
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: Propuesta
          root_file: final_proposal.tex
        continue-on-error: true

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Documentation-PDFs
          path: |
            Propuesta/*.pdf
            Informe_final/*.pdf
          retention-days: 30
        continue-on-error: true
