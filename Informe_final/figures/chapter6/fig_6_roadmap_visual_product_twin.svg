<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111"/>
    </marker>
    <style>
      text { font-family: Roboto, Arial, sans-serif; fill: #111111; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #333333; }
      .phase { font-size: 15px; font-weight: 700; }
      .body { font-size: 12px; fill: #222222; }
      .small { font-size: 11px; fill: #333333; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; rx: 8; ry: 8; }
      .current { fill: #d9d9d9; stroke: #111111; stroke-width: 2; rx: 8; ry: 8; }
      .future { fill: #f7f7f7; stroke: #555555; stroke-width: 1.5; rx: 8; ry: 8; }
      .dash { fill: #ffffff; stroke: #777777; stroke-width: 1.5; stroke-dasharray: 7 5; rx: 8; ry: 8; }
      .arrow { stroke: #111111; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text class="title" x="550" y="44" text-anchor="middle">Roadmap de madurez posterior al visual product twin</text>
  <text class="subtitle" x="550" y="72" text-anchor="middle">La evolución debe avanzar por evidencia, interoperabilidad y datos operativos antes de declarar un gemelo digital operacional</text>

  <rect class="current" x="45" y="135" width="145" height="155"/>
  <text class="phase" x="118" y="164" text-anchor="middle">Fase 0</text>
  <text class="body" x="118" y="190" text-anchor="middle">Cierre visual</text>
  <text class="small" x="118" y="218" text-anchor="middle">capturas finales</text>
  <text class="small" x="118" y="237" text-anchor="middle">SUS / NASA-TLX</text>
  <text class="small" x="118" y="256" text-anchor="middle">KPIs fechados</text>

  <line class="arrow" x1="190" y1="212" x2="235" y2="212"/>

  <rect class="future" x="235" y="135" width="145" height="155"/>
  <text class="phase" x="308" y="164" text-anchor="middle">Fase 1</text>
  <text class="body" x="308" y="190" text-anchor="middle">twin_manifest</text>
  <text class="small" x="308" y="218" text-anchor="middle">partId estable</text>
  <text class="small" x="308" y="237" text-anchor="middle">material / función</text>
  <text class="small" x="308" y="256" text-anchor="middle">fallas y repuestos</text>

  <line class="arrow" x1="380" y1="212" x2="425" y2="212"/>

  <rect class="future" x="425" y="135" width="145" height="155"/>
  <text class="phase" x="498" y="164" text-anchor="middle">Fase 2</text>
  <text class="body" x="498" y="190" text-anchor="middle">Telemetry playback</text>
  <text class="small" x="498" y="218" text-anchor="middle">CSV / JSON</text>
  <text class="small" x="498" y="237" text-anchor="middle">estados por pieza</text>
  <text class="small" x="498" y="256" text-anchor="middle">línea de tiempo</text>

  <line class="arrow" x1="570" y1="212" x2="615" y2="212"/>

  <rect class="future" x="615" y="135" width="145" height="155"/>
  <text class="phase" x="688" y="164" text-anchor="middle">Fase 3</text>
  <text class="body" x="688" y="190" text-anchor="middle">Live digital shadow</text>
  <text class="small" x="688" y="218" text-anchor="middle">MQTT / REST</text>
  <text class="small" x="688" y="237" text-anchor="middle">MAVLink / WoT</text>
  <text class="small" x="688" y="256" text-anchor="middle">frecuencia definida</text>

  <line class="arrow" x1="760" y1="212" x2="805" y2="212"/>

  <rect class="future" x="805" y="135" width="145" height="155"/>
  <text class="phase" x="878" y="164" text-anchor="middle">Fase 4</text>
  <text class="body" x="878" y="190" text-anchor="middle">Modo servicio</text>
  <text class="small" x="878" y="218" text-anchor="middle">síntomas</text>
  <text class="small" x="878" y="237" text-anchor="middle">checklists</text>
  <text class="small" x="878" y="256" text-anchor="middle">reportes por pieza</text>

  <line class="arrow" x1="950" y1="212" x2="995" y2="212"/>

  <rect class="dash" x="995" y="135" width="75" height="155"/>
  <text class="phase" x="1033" y="164" text-anchor="middle">Fase 5</text>
  <text class="body" x="1033" y="195" text-anchor="middle">Twin</text>
  <text class="body" x="1033" y="214" text-anchor="middle">oper.</text>
  <text class="small" x="1033" y="244" text-anchor="middle">what-if</text>
  <text class="small" x="1033" y="263" text-anchor="middle">HITL</text>

  <rect class="box" x="125" y="345" width="850" height="92"/>
  <text class="phase" x="155" y="374">Control de sobrepromesa</text>
  <text class="body" x="155" y="403">Cada fase exige evidencia fechada, trazabilidad por componente y validación de alcance antes de usar términos como digital shadow o digital twin operacional.</text>
  <text class="body" x="155" y="425">El estado actual queda defendido como visual product twin y base visual-semántica para madurez posterior.</text>
</svg>
